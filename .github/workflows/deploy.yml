name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Staging
        run: echo "Deploying to Staging!"

  deploy-production:
    runs-on: ubuntu-latest
    environment: Production
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Production
        run: echo "Deploying to Production!"
